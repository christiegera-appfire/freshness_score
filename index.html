function resolveProductName(raw) {
  if (!raw) return 'Unknown';
  // Check if it's a space key (all caps, short, no spaces)
  var trimmed = raw.trim();
  if (SPACE_LOOKUP[trimmed]) return SPACE_LOOKUP[trimmed];
  // Also try uppercase version
  if (SPACE_LOOKUP[trimmed.toUpperCase()]) return SPACE_LOOKUP[trimmed.toUpperCase()];
  // Otherwise return as-is (already a product name)
  return trimmed;
}

function initGoogle() {
  var attempts = 0;
  var interval = setInterval(function() {
    attempts++;
    if (typeof google !== 'undefined' && google.accounts) {
      clearInterval(interval);
      var token = localStorage.getItem('bq_token');
      var email = localStorage.getItem('user_email');
      if (token) {
        accessToken = token;
        if (email) document.getElementById('user-email').textContent = email;
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadData();
        return;
      }
      google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onSignIn });
      google.accounts.id.renderButton(
        document.getElementById('signin-btn-container'),
        { theme: 'filled_blue', size: 'large' }
      );
    }
    if (attempts > 40) clearInterval(interval);
  }, 250);
}

window.addEventListener('load', initGoogle);

function onSignIn(response) {
  try {
    var payload = JSON.parse(atob(response.credential.split('.')[1]));
    var email = payload.email || '';
    localStorage.setItem('user_email', email);
    document.getElementById('user-email').textContent = email;
  } catch(e) {}
  refreshToken(function() {
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  });
}

function refreshToken(callback) {
  var tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/bigquery.readonly',
    callback: function(r) {
      if (r.error) { showError('Session expired. Please sign out and sign in again.'); return; }
      accessToken = r.access_token;
      localStorage.setItem('bq_token', r.access_token);
      if (callback) callback();
    }
  });
  tokenClient.requestAccessToken({ prompt: '' });
}

function signOut() {
  google.accounts.id.disableAutoSelect();
  localStorage.removeItem('bq_token');
  localStorage.removeItem('user_email');
  accessToken = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('main').style.display = 'none';

function buildQuery() {
  var now = new Date();
  var pad = function(n) { return String(n).padStart(2,'0'); };
  var fmt = function(d) { return '' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()); };
  var end = fmt(now);
  var start = fmt(new Date(now.getTime() - 14 * 86400000));
  return "SELECT"
    + " (SELECT value.string_value FROM UNNEST(event_params) WHERE key = 'page_title') AS page_title,"
    + " (SELECT value.string_value FROM UNNEST(event_params) WHERE key = 'product_name') AS product_name,"
    + " (SELECT value.string_value FROM UNNEST(event_params) WHERE key = 'page_path') AS page_path,"
    + " (SELECT value.string_value FROM UNNEST(event_params) WHERE key = 'last_updated') AS last_updated_raw,"
    + " COUNT(*) AS page_views"
    + " FROM `" + PROJECT + "." + DATASET + ".events_*`"
    + " WHERE event_name = 'af_content_freshness'"
    + " AND _TABLE_SUFFIX BETWEEN '" + start + "' AND '" + end + "'"
    + " GROUP BY 1,2,3,4"
    + " HAVING page_title IS NOT NULL AND product_name IS NOT NULL"
    + " ORDER BY page_views DESC"
    + " LIMIT 200";
}

function parseDays(raw, todayMs) {
  if (!raw) return null;
  var m = raw.match(/(\d+) days? ago/);
  if (m) return parseInt(m[1]);
  if (raw.indexOf('a day ago') !== -1) return 1;
  if (raw.indexOf('minute') !== -1 || raw.indexOf('second') !== -1) return 0;
  var dm = raw.match(/(\d{1,2}) ([A-Za-z]+),? (\d{4})/);
  if (dm) {
    var months = {January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
    var month = months[dm[2]];
    if (month !== undefined) {
      var d = new Date(parseInt(dm[3]), month, parseInt(dm[1]));
      return Math.round((todayMs - d.getTime()) / 86400000);
    }
  }
  return null;
}

function bandFromDays(days) {
  if (days === null) return 'unknown';
  if (days <= 90) return 'fresh';
  if (days <= 180) return 'aging';
  if (days <= 365) return 'stale';
  return 'critical';
}

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('main').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  try {
    var res = await fetch(
      'https://bigquery.googleapis.com/bigquery/v2/projects/' + PROJECT + '/queries',
      {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: buildQuery(), useLegacySql: false, timeoutMs: 30000 })
      }
    );
    var json = await res.json();
    if (json.error) {
      if (json.error.code === 401) { localStorage.removeItem('bq_token'); refreshToken(loadData); return; }
      showError(json.error.message); return;
    }
    var now = new Date();
    var fields = json.schema.fields.map(function(f) { return f.name; });
    allData = (json.rows || []).map(function(row) {
      var obj = {};
      row.f.forEach(function(cell, i) { obj[fields[i]] = cell.v; });
      obj.page_views = parseInt(obj.page_views, 10);
      obj.days_since_update = parseDays(obj.last_updated_raw, now.getTime());
      obj.freshness_band = bandFromDays(obj.days_since_update);
      obj.product_display = resolveProductName(obj.product_name);
      return obj;
    });
    document.getElementById('last-updated').textContent =
      'Live data · last 14 days · ' + allData.length + ' pages · refreshed ' + now.toLocaleTimeString();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    renderAll();
  } catch(e) { showError(e.message); }
}

function toggleDropdown() {
  var dd = document.getElementById('filter-dropdown');
  var btn = document.getElementById('filter-btn');
  var isOpen = dd.classList.contains('open');
  if (isOpen) {
    dd.classList.remove('open');
    btn.classList.remove('open');
  } else {
    dd.classList.add('open');
    btn.classList.add('open');
    document.getElementById('filter-search').focus();
    renderDropdown();
  }
}

document.addEventListener('click', function(e) {
  var wrap = document.getElementById('filter-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('filter-dropdown').classList.remove('open');
    document.getElementById('filter-btn').classList.remove('open');
  }
});

function renderDropdown() {
  var search = document.getElementById('filter-search').value.toLowerCase();
  var products = Array.from(new Set(allData.map(function(d) { return d.product_display; }))).sort();
  var filtered = search ? products.filter(function(p) { return p.toLowerCase().indexOf(search) !== -1; }) : products;
  var list = document.getElementById('filter-list');

  // Build preset options at top (only show when not searching)
  var presetHtml = '';
  if (!search) {
    var accelerateActive = selectedProducts.length > 0 &&
      ACCELERATE_APPS.every(function(p) { return selectedProducts.indexOf(p) !== -1; }) &&
      selectedProducts.every(function(p) { return ACCELERATE_APPS.indexOf(p) !== -1; });
    var allActive = selectedProducts.length === 0;

    presetHtml = '<div class="filter-item' + (accelerateActive ? ' checked' : '') + '" onclick="selectAccelerate()">'
      + '<div class="check">' + (accelerateActive ? '✓' : '') + '</div>Accelerate apps only</div>'
      + '<div class="filter-item' + (allActive ? ' checked' : '') + '" onclick="clearFilter()">'
      + '<div class="check">' + (allActive ? '✓' : '') + '</div>All apps</div>'
      + '<div style="border-top:1px solid #334155;margin:6px 0;"></div>';
  }

  list.innerHTML = presetHtml + filtered.map(function(p) {
    var checked = selectedProducts.indexOf(p) !== -1;
    return '<div class="filter-item' + (checked ? ' checked' : '') + '" onclick="toggleProduct(\'' + p.replace(/'/g, "\\'") + '\')">'
      + '<div class="check">' + (checked ? '✓' : '') + '</div>'
      + p + '</div>';
  }).join('');
}

function selectAccelerate() {
  selectedProducts = ACCELERATE_APPS.filter(function(p) {
    return allData.some(function(d) { return d.product_display === p; });
  });
  updateFilterLabel();
  renderDropdown();
  renderChart();
  renderCards();
}

function toggleProduct(p) {
  var idx = selectedProducts.indexOf(p);
  if (idx === -1) selectedProducts.push(p);
  else selectedProducts.splice(idx, 1);
  updateFilterLabel();
  renderDropdown();
  renderChart();
  renderCards();
}

function clearFilter() {
  selectedProducts = [];
  updateFilterLabel();
  renderChart();
  renderCards();
}

function updateFilterLabel() {
  var label = document.getElementById('filter-label');
  var clearBtn = document.getElementById('filter-clear');
  if (selectedProducts.length === 0) {
    label.textContent = 'All apps';
    clearBtn.style.display = 'none';
  } else {
    var accelerateActive = ACCELERATE_APPS.every(function(p) { return selectedProducts.indexOf(p) !== -1; }) &&
      selectedProducts.every(function(p) { return ACCELERATE_APPS.indexOf(p) !== -1; });
    if (accelerateActive) {
      label.textContent = 'Accelerate apps only';
    } else if (selectedProducts.length === 1) {
      label.textContent = selectedProducts[0];
    } else {
      label.textContent = selectedProducts.length + ' products selected';
    }
    clearBtn.style.display = 'block';
  }
}

function renderPills() { renderDropdown(); }

function renderChart() {
  var data = selectedProducts.length === 0
    ? allData
    : allData.filter(function(d) { return selectedProducts.indexOf(d.product_display) !== -1; });
  var svg = document.getElementById('chart');
  svg.innerHTML = '';
  var W = 600, H = 380, maxDays = 500;
  var maxViews = Math.max.apply(null, allData.map(function(d) { return d.page_views; }));
  var toX = function(d) { return (1 - Math.min((d.days_since_update || 0) / maxDays, 1)) * W; };
  var toY = function(d) { return (1 - Math.min(d.page_views / maxViews, 1)) * H; };
  var toR = function(d) { return 3 + (d.page_views / maxViews) * 12; };
  var ns = 'http://www.w3.org/2000/svg';
  var rect = function(x,y,w,h,fill,op) { var el = document.createElementNS(ns,'rect'); el.setAttribute('x',x); el.setAttribute('y',y); el.setAttribute('width',w); el.setAttribute('height',h); el.setAttribute('fill',fill); el.setAttribute('opacity',op); svg.appendChild(el); };
  var line = function(x1,y1,x2,y2) { var el = document.createElementNS(ns,'line'); el.setAttribute('x1',x1); el.setAttribute('y1',y1); el.setAttribute('x2',x2); el.setAttribute('y2',y2); el.setAttribute('stroke','#334155'); el.setAttribute('stroke-width','1'); el.setAttribute('stroke-dasharray','4,4'); svg.appendChild(el); };
  var txt = function(x,y,str,fill,size) { var el = document.createElementNS(ns,'text'); el.setAttribute('x',x); el.setAttribute('y',y); el.setAttribute('fill',fill); el.setAttribute('font-size',size); el.setAttribute('font-weight','700'); el.setAttribute('letter-spacing','1'); el.setAttribute('font-family','system-ui,sans-serif'); el.textContent=str; svg.appendChild(el); };

  rect(0,0,300,190,'#1e3a2e',0.4); rect(300,0,300,190,'#1e3a2e',0.7);
  rect(0,190,300,190,'#3a1e1e',0.4); rect(300,190,300,190,'#3a2a1e',0.4);
  line(300,0,300,380); line(0,190,600,190);
  txt(8,14,'STALE','#f8717188',9); txt(8,24,'UNPOPULAR','#f8717188',9);
  txt(308,14,'FRESH','#4ade80bb',9); txt(308,24,'UNPOPULAR','#4ade80bb',9);
  txt(8,204,'STALE','#fb923cbb',9); txt(8,214,'POPULAR !','#fb923cbb',9);
  txt(308,204,'FRESH','#4ade8088',9); txt(308,214,'POPULAR ✓','#4ade8088',9);

  var tt = document.getElementById('tooltip');
  data.forEach(function(d) {
    if (d.days_since_update === null) return;
    var c = document.createElementNS(ns,'circle');
    c.setAttribute('cx', toX(d)); c.setAttribute('cy', toY(d)); c.setAttribute('r', toR(d));
    c.setAttribute('fill', COLORS[d.freshness_band] || '#6b7280'); c.setAttribute('opacity','0.85');
    c.addEventListener('mouseenter', function(e) {
      tt.style.display='block'; tt.style.left=(e.clientX+12)+'px'; tt.style.top=(e.clientY-10)+'px';
      document.getElementById('tt-title').textContent = d.page_title;
      document.getElementById('tt-product').textContent = d.product_display;
      document.getElementById('tt-band').textContent = d.freshness_band.toUpperCase();
      document.getElementById('tt-band').style.color = COLORS[d.freshness_band];
      document.getElementById('tt-meta').textContent = d.days_since_update + ' days old · ' + d.page_views + ' views';
    });
    c.addEventListener('mousemove', function(e) { tt.style.left=(e.clientX+12)+'px'; tt.style.top=(e.clientY-10)+'px'; });
    c.addEventListener('mouseleave', function() { tt.style.display='none'; });
    svg.appendChild(c);
  });
}

function renderCards() {
  var data = selectedProducts.length === 0 ? allData : allData.filter(function(d) { return selectedProducts.indexOf(d.product_display) !== -1; });
  var sorted = allData.slice().sort(function(a,b) { return a.page_views - b.page_views; });
  var medianViews = sorted[Math.floor(sorted.length/2)].page_views;
  var keepAsIs = data.filter(function(d) { return (d.days_since_update||999)<=MEDIAN_DAYS && d.page_views>=medianViews; });
  var urgent   = data.filter(function(d) { return (d.days_since_update||999)> MEDIAN_DAYS && d.page_views>=medianViews; });
  var promote  = data.filter(function(d) { return (d.days_since_update||999)<=MEDIAN_DAYS && d.page_views< medianViews; });
  var archive  = data.filter(function(d) { return (d.days_since_update||999)> MEDIAN_DAYS && d.page_views< medianViews; });
  var cards = [
    {label:'KEEP AS-IS', count:keepAsIs.length, desc:'Fresh & popular – your best content', color:'#4ade80'},
    {label:'UPDATE URGENTLY', count:urgent.length, desc:'High traffic but content is aging', color:'#fb923c'},
    {label:'PROMOTE', count:promote.length, desc:'Good content, needs more visibility', color:'#94a3b8'},
    {label:'ARCHIVE CANDIDATES', count:archive.length, desc:'Old & low traffic – review for removal', color:'#f87171'},
  ];
  document.getElementById('cards').innerHTML = cards.map(function(c) {
    return '<div class="card" style="border-top:2px solid ' + c.color + '">'
      + '<div class="card-label">' + c.label + '</div>'
      + '<div class="card-count" style="color:' + c.color + '">' + c.count + '</div>'
      + '<div class="card-desc">' + c.desc + '</div>'
      + '</div>';
  }).join('');
}
</script>
</body>
</html>
